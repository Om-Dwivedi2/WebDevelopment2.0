<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>login</title>

    <link rel="stylesheet" href="./css/style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <body>
    <nav class="d-flex align-items-center justify-content-between px-5">
      <a class="text-decoration-none" href="./index.html"
        ><img src="./images/logo-light.png" alt=""
      /></a>
      <div class="d-flex gap-2">
        <a
          id="loginButton"
          class="text-decoration-none text-white px-3 py-1 rounded-2"
          href="./login.html"
          >Login</a
        >
        <a
          id="registerButton"
          class="text-decoration-none border border-white px-3 py-1 rounded-2"
          href="./register.html"
          >Register</a
        >
      </div>
    </nav>

    <section
      id="feedback-section"
      class="d-flex justify-content-end align-items-center"
    >
      <main class="px-5 py-4 bg-white rounded-3">
        <h3 class="text-center fw-bold">Share Feedback</h3>
        <p class="text-center">Help us improve your Cravings experience.</p>

        <div class="d-grid">
          <label class="fw-semibold" for="feedback-name">Full Name</label>
          <input
            class="rounded-2 py-1 px-2 mt-2 mb-3"
            name="feedback-name"
            id="feedback-name"
            type="text"
            placeholder="Enter your full name"
          />

          <label class="fw-semibold" for="feedback-email">Email</label>
          <input
            class="rounded-2 py-1 px-2 mt-2 mb-3"
            name="feedback-email"
            id="feedback-email"
            type="email"
            placeholder="Enter your email"
          />

          <label class="fw-semibold" for="feedback-category"
            >Feedback Category</label
          >
          <select
            name="feedback-category"
            id="feedback-category"
            class="rounded-2 py-1 px-2 mt-2 mb-3"
          >
            <option value="">Select a category</option>
            <option value="foodQuality">Food Quality</option>
            <option value="DeliveryExperience">Delivery Experience</option>
            <option value="app">App & Website</option>
            <option value="customerSupport">Customer Support</option>
            <option value="pricing">Pricing & Value</option>
          </select>

          <div class="d-flex align-items-center gap-4 mb-3 mt-1">
            <label class="fw-semibold" for="">Overall Rating</label>
            <div>
              <i class="bi bi-star-fill fs-4"></i>
              <i class="bi bi-star-fill fs-4"></i>
              <i class="bi bi-star-fill fs-4"></i>
              <i class="bi bi-star-fill fs-4"></i>
              <i class="bi bi-star-fill fs-4"></i>
            </div>
          </div>

          <label class="fw-semibold" for="feedback">Your Feedback</label>
          <textarea
            rows="3"
            name="feedback"
            id="feedback"
            class="rounded-2 py-1 px-2 mt-2 mb-3"
            placeholder="Tell us about experience..."
          ></textarea>

          <button
            class="text-white text-center py-3 mt-2 rounded-2 fw-semibold border-0"
          >
            Submit Feedback
          </button>
        </div>
      </main>
    </section>
  </body>
</html>
