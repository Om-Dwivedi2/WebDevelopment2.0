<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <link rel="stylesheet" href="./css/style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"

  <body>
    <nav class="d-flex align-items-center justify-content-between px-5">
      <a class="text-decoration-none" href="./index.html"
        ><img src="./images/logo-light.png" alt=""
      /></a>
      <div class="d-flex gap-2">
        <a
          id="loginButton"
          class="text-decoration-none text-white px-3 py-1 rounded-2"
          href="./login.html"
          >Login</a
        >
        <a
          id="registerButton"
          class="text-decoration-none border border-white px-3 py-1 rounded-2"
          href="./register.html"
          >Register</a
        >
      </div>
    </nav>

    <section id="register-section" class=" d-flex align-items-center justify-content-end px-5">
      <main class="bg-white">
        <h2>Create Account</h2>
          <p>Join us as a Customer, Restaurant, or Rider</p>
          <div>Register as:</div>
          <input type="checkbox" name="customer" id="customer">
          <label for="customer">Customer</label>
      </main>
    </section>
