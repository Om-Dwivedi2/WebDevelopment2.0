<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>

    <link rel="stylesheet" href="style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <body>
    <main class="d-flex flex-column align-items-center justify-content-center">
      <div
        id="calculator"
        class="bg-light rounded-4 p-1 d-flex flex-column gap-1"
      >
        <section
          id="top"
          class="rounded-top-4 bg-success-subtle border border-dark d-flex align-items-center justify-content-end py-4 px-2"
        >
          <label id="text">0</label>
        </section>
        <section
          id="bottom"
          class="rounded-bottom-4 bg-danger-subtle border border-dark p-3"
        >
          <div class="row py-1">
            <div class="col-3">
              <button
                class="rounded-circle w-100 circle p-3 text-center fw-semibold shadow border-0"
                onclick="calculate('AC')"
              >
                AC
              </button>
            </div>
            <div class="col-3">
              <button
                class="rounded-circle w-100 circle p-3 text-center fw-semibold shadow border-0"
                onclick="calculate('C')"
              >
                C
              </button>
            </div>
            <div class="col-3">
              <button
                class="rounded-circle w-100 circle p-3 text-center fw-semibold shadow border-0"
                onclick="calculate('%')"
              >
                %
              </button>
            </div>
            <div class="col-3">
              <button
                class="rounded-circle w-100 bg-warning circle p-3 text-center fw-semibold shadow border-0"
                onclick="calculate('/')"
              >
                /
              </button>
            </div>
          </div>

          <div class="row py-1">
            <div class="col-3">
              <button
                class="rounded-circle w-100 circle p-3 text-center fw-semibold shadow border-0"
                onclick="calculate('7')"
              >
                7
              </button>
            </div>
            <div class="col-3">
              <button
                class="rounded-circle w-100 circle p-3 text-center fw-semibold shadow border-0"
                onclick="calculate('8')"
              >
                8
              </button>
            </div>
            <div class="col-3">
              <button
                class="rounded-circle w-100 circle p-3 text-center fw-semibold shadow border-0"
                onclick="calculate('9')"
              >
                9
              </button>
            </div>
            <div class="col-3">
              <button
                class="rounded-circle w-100 bg-warning circle p-3 text-center fw-semibold shadow border-0"
                onclick="calculate('*')"
              >
                *
              </button>
            </div>
          </div>

          <div class="row py-1">
            <div class="col-3">
              <button
                class="rounded-circle w-100 circle p-3 text-center fw-semibold shadow border-0"
                onclick="calculate('4')"
              >
                4
              </button>
            </div>
            <div class="col-3">
              <button
                class="rounded-circle w-100 circle p-3 text-center fw-semibold shadow border-0"
                onclick="calculate('5')"
              >
                5
              </button>
            </div>
            <div class="col-3">
              <button
                class="rounded-circle w-100 circle p-3 text-center fw-semibold shadow border-0"
                onclick="calculate('6')"
              >
                6
              </button>
            </div>
            <div class="col-3">
              <button
                class="rounded-circle w-100 bg-warning circle p-3 text-center fw-semibold shadow border-0"
                onclick="calculate('-')"
              >
                -
              </button>
            </div>
          </div>

          <div class="row py-1">
            <div class="col-3">
              <button
                class="rounded-circle w-100 circle p-3 text-center fw-semibold shadow border-0"
                onclick="calculate('1')"
              >
                1
              </button>
            </div>
            <div class="col-3">
              <button
                class="rounded-circle w-100 circle p-3 text-center fw-semibold shadow border-0"
                onclick="calculate('2')"
              >
                2
              </button>
            </div>
            <div class="col-3">
              <button
                class="rounded-circle w-100 circle p-3 text-center fw-semibold shadow border-0"
                onclick="calculate('3')"
              >
                3
              </button>
            </div>
            <div class="col-3">
              <button
                class="rounded-circle w-100 bg-warning circle p-3 text-center fw-semibold shadow border-0"
                onclick="calculate('+')"
              >
                +
              </button>
            </div>
          </div>

          <div class="row py-1">
            <div class="col-3">
              <button
                class="rounded-circle w-100 circle p-3 text-center fw-semibold shadow border-0"
                onclick="calculate('0')"
              >
                0
              </button>
            </div>
            <div class="col-3">
              <button
                class="rounded-circle w-100 circle p-3 text-center fw-semibold shadow border-0"
                onclick="calculate('.')"
              >
                .
              </button>
            </div>
            <div class="col-6"><button
              class="rounded-5 bg-success w-100 greenCircle p-3 text-center fw-semibold shadow border-0"
              onclick="calculate('=')"
            >
              =
            </button></div>
          </div>
        </section>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="./script.js"></script>
  </body>
</html>
