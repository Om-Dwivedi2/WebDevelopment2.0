<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password Manager</title>

    <link rel="stylesheet" href="style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <body class="bg-bl ack">
    <header
      class="text-center text-white bg-primary text-white p-2 d-flex align-items-center justify-content-between px-5"
    >
      <h2>Password Manager</h2>

      <div class="d-flex gap-5">
        <a href="./index.html" class="text-decoration-none text-white"
          >Add new Password</a
        ><a href="./index2.html" class="text-decoration-none text-white"
          >View Saved Password</a
        >
      </div>
    </header>

    <main>
      <div class="w-50 mx-auto rounded mt-4 p-3 border">
        <form id="passForm" class="d-flex flex-column gap-3">
          <div>
            <input
              type="text"
              name="websiteName"
              id="websiteName"
              placeholder="Enter the Website Name"
              class="form-control"
            />

            <span
              class="error text-danger d-flex justify-content-end"
              id="websiteNameError"
              ></span
            >
          </div>
          <div>
            <input
              type="text"
              name="userName"
              id="userName"
              placeholder="Enter the User Name"
              class="form-control"
            />
            <span
              class="error text-danger d-flex justify-content-end"
              id="userNameError"
              ></span
            >
          </div>
          <div>
            <input
              type="text"
              name="password"
              id="password"
              placeholder="Enter the Password"
              class="form-control"
            />
            <span
              class="error text-danger d-flex justify-content-end"
              id="passwordError"
              ></span
            >
          </div>

          <div class="d-flex justify-content-around">
            <button type="submit" class="btn btn-outline-success px-4 py-2">
              Save
            </button>
            <button type="reset" class="btn btn-outline-danger px-4 py-2">
              Clear
            </button>
          </div>
        </form>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="./script.js"></script>
  </body>
</html>
