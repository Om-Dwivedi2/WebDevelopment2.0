<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>

    <link rel="stylesheet" href="style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <body>
    <main class="container-fluid py-4">
      <div class="weather-dashboard mx-auto">
        <div class="row g-0">
          <!-- SIDEBAR -->

          <aside class="col-lg-4 col-xl-3 bg-white">
            <div class="p-4 p-xl-5 d-flex flex-column gap-4">
              <!-- SEARCH BAR -->

              <div class="d-flex">
                <div class="input-group">
                  <span class="input-group-text bg-transparent border-0">
                    <i class="bi bi-search"></i>
                  </span>

                  <input
                    type="search"
                    class="form-control border-0 shadow-none"
                    placeholder="Search City"
                    id="city"
                  />
                </div>

                <button
                  class="btn btn-outline-dark rounded-4 px-4"
                  onclick="getWeather()"
                >
                  Search
                </button>
              </div>

              <!-- WEATHER IMAGE -->

              <div class="text-center weather-icon">
                <img
                  id="weatherImg"
                  src="./asserts/weatherImage.jpg"
                  alt="Weather Illustration"
                  class="img-fluid weather-icon"
                />
              </div>

              <!-- TEMPERATURE -->

              <section>
                <h1 class="display-2 fw-light mb-0" id="temp">12°c</h1>

                <p class="text-secondary mb-0" id="time">Monday, 16:00</p>
              </section>

              <hr />

              <!-- WEATHER DETAILS -->

              <div class="d-flex flex-column gap-3">
                <div class="d-flex align-items-center gap-2">
                  <i class="bi bi-cloud"></i>

                  <span id="weather" class="text-capitalize"
                    >Mostly Cloudy</span
                  >
                </div>

                <div class="d-flex align-items-center gap-2">
                  <i class="bi bi-cloud"></i>

                  <span id="clouds" class="text-capitalize">Rain - 30%</span>
                </div>
              </div>

              <!-- LOCATION CARD -->

              <div class="location-card">
                <img id="cityPhoto" src="https://assets.gqindia.com/photos/678f865dad1cf42603245293/16:9/w_2560%2Cc_limit/Mumbai.jpg" alt="" />

                <div class="location-overlay">
                  <h2
                    class="h6 text-white fw-semibold mb-0 text-capitalize"
                    id="country"
                  >
                    City
                  </h2>
                </div>
              </div>
            </div>
          </aside>

          <!-- MAIN SECTION -->

          <section class="col-lg-8 col-xl-9">
            <div class="p-4 p-xl-5">
              <h2 class="fw-semibold mb-4">Today's Highlights</h2>

              <div class="row g-4">
                <!-- Pressure -->

                <div class="col-md-6 col-xl-4">
                  <article class="weather-card">
                    <h3 class="card-title-small">Pressure</h3>

                    <div class="display-5 fw-semibold mt-3" id="pressure">
                      ----
                    </div>
                    <div class="text-secondary">hPa</div>
                  </article>
                </div>

                <!-- WIND STATUS -->

                <div class="col-md-6 col-xl-4">
                  <article class="weather-card">
                    <h3 class="card-title-small">Wind Status</h3>

                    <div class="display-5 fw-semibold" id="wind">----</div>

                    <div class="text-secondary">km/h</div>

                    <div class="mt-3 d-flex align-items-center gap-2">
                      <i class="bi bi-compass"></i>

                      <span id="windDeg">WSW</span>
                    </div>
                  </article>
                </div>

                <!-- SUNRISE SUNSET -->

                <div class="col-md-6 col-xl-4">
                  <article class="weather-card">
                    <h3 class="card-title-small">Sunrise & Sunset</h3>

                    <div class="d-flex align-items-center gap-3 mb-3">
                      <i class="bi bi-sunrise fs-3"></i>

                      <div>
                        <div class="fw-semibold text-uppercase" id="sunRise">
                          -----
                        </div>
                      </div>
                    </div>

                    <div class="d-flex align-items-center gap-3">
                      <i class="bi bi-sunset fs-3"></i>

                      <div>
                        <div class="fw-semibold text-uppercase" id="sunSet">
                          -----
                        </div>
                      </div>
                    </div>
                  </article>
                </div>

                <!-- HUMIDITY -->

                <div class="col-md-6 col-xl-4">
                  <article class="weather-card position-relative">
                    <h3 class="card-title-small">Humidity</h3>

                    <div class="display-5 fw-semibold" id="humidity">----</div>

                    <div class="mt-2" id="humidityCondition"></div>

                    <!-- Optional vertical indicator -->
                  </article>
                </div>

                <!-- VISIBILITY -->

                <div class="col-md-6 col-xl-4">
                  <article class="weather-card">
                    <h3 class="card-title-small">Visibility</h3>

                    <div class="display-5 fw-semibold" id="visibility">
                      ----
                    </div>

                    <div>km</div>
                  </article>
                </div>

                <!-- Sea Level -->

                <div class="col-md-6 col-xl-4">
                  <article class="weather-card position-relative">
                    <h3 class="card-title-small">Sea Level</h3>

                    <div class="display-5 fw-semibold" id="seaLevel">----</div>
                    <div class="text-secondary">hPa</div>

                    <!-- Optional indicator -->
                  </article>
                </div>
              </div>
            </div>
          </section>
        </div>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="./script.js"></script>
  </body>
</html>
