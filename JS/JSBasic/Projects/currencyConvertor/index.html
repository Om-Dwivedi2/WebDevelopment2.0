<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Currency Convertor</title>

    <link rel="stylesheet" href="style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <body>
    <main class="container py-5">
      <div class="card shadow-sm mx-auto p-4 p-lg-5">
        <h1 class="fw-bold text-center mb-5">Currency Converter</h1>

        <div class="mb-4">
          <label for="amount" class="form-label fw-semibold"> Amount </label>

          <input
            type="number"
            id="amount"
            class="form-control form-control-lg"
            placeholder="Enter Amount"
          />

          <div id="amountError" class="text-danger mt-1 text-end"></div>
        </div>

        <div class="row g-4 align-items-center">
          <div class="col-md-5">
            <label class="form-label fw-semibold"> From </label>

            <div class="card border-0 bg-light p-3">
              <div class="text-center mb-3">
                <img
                  id="fromFlag"
                  src="https://flagsapi.com/US/flat/64.png"
                  alt="From Country Flag"
                  class="flagImage"
                />
              </div>

              <select
                id="fromCountry"
                class="form-select"
                onchange="flagChange(id)"
              >
                <option value="" disabled>
                  -- Select a Country --
                </option>
              </select>
              <div id="fromError" class="text-danger mt-1 text-end"></div>
            </div>
          </div>

          <div class="col-md-2 text-center">
            <button id="swapBtn" class="btn btn-primary rounded-circle">
              <i class="bi bi-arrow-left-right"></i>
            </button>
          </div>

          <div class="col-md-5">
            <label class="form-label fw-semibold"> To </label>

            <div class="card border-0 bg-light p-3">
              <div class="text-center mb-3">
                <img
                  id="toFlag"
                  src="https://flagsapi.com/IN/flat/64.png"
                  alt="To Country Flag"
                  class="flagImage"
                />
              </div>

              <select
                id="toCountry"
                class="form-select"
                onchange="flagChange(id)"
              >
                <option value="" disabled >
                  -- Select a Country --
                </option>
              </select>

              <div id="toError" class="text-danger mt-1 text-end"></div>
            </div>
          </div>
        </div>

        <div id="errorMessage" class="text-danger text-center mt-3"></div>

        <div class="mt-4">
          <button
            id="convertBtn"
            class="btn btn-primary w-100 py-3 fw-semibold"
          >
            Convert Currency
          </button>
        </div>

        <div id="resultCard" class="mt-4 d-none">
          <p class="text-secondary mb-2">Converted Amount</p>

          <h1 id="newAmount" class="fw-bold mb-2">0.00 INR</h1>

          <p id="exchangeRate" class="text-secondary">1 USD = 83.50 INR</p>
        </div>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="./script.js"></script>
  </body>
</html>
