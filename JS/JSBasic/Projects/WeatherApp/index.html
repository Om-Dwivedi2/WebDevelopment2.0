<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>

    <link rel="stylesheet" href="style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <body>
    <header
      class="container w-50 bg-warning rounded-3 my-3 text-center text-white p-2"
    >
      <h2>Weather App</h2>
    </header>

    <main
      class="container p-3 border border-1 rounded-4 mt-5 d-flex flex-column gap-3"
    >
      <div class="container d-flex align-items-center gap-4 w-50">
        <input
          type="text"
          name="city"
          id="city"
          class="form-control"
          placeholder="Enter City name"
        />
        <button
          class="btn btn-outline-success w-25 fw-semibold"
          onclick="getWeather()"
        >
          Get Weather
        </button>
      </div>

      <div
        id="card"
        class="card d-grid gap-3 shadow p-4 w-25 mx-auto rounded-4"
      >
        <div id="place">
          <h4 id="cityDiv" class="text-uppercase" ></h4>
          
        </div>
        <h1 id="temp"></h1>
        <img id="weatherImg" class="" src="" alt="" />
        <div id="weather" class="text-uppercase fw-semibold"></div>
      </div>
    </main>

   

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="./script.js"></script>
  </body>
</html>
