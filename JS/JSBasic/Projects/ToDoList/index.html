<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To Do List</title>

    <link rel="stylesheet" href="style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <body>
    <header class="text-center bg-primary text-white p-2">
      <h1>To Do List</h1>
    </header>

    <main class="container bg-light rounded shadow p-3 my-2">
      <div class="d-flex justify-content-center gap-3">
        <input class="form-control w-50" type="text" placeholder="Add Task" id="task"/>
        <button class="btn btn-outline-success" id="addTask">
          <i class="bi bi-plus-circle"></i> Add Task
        </button>
      </div>

      <ol>
        <!-- <li>
          <section
            class="container w-75 bg-light rounded shadow p-3 my-3 d-flex justify-content-between align-items-center"
          >
            <div>The Task</div>
            <button class="btn btn-outline-danger">
              <i class="bi bi-trash"></i> <span>Remove</span>
            </button>
          </section>
        </li> -->
      </ol>


    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="./script.js"></script>
  </body>
</html>
