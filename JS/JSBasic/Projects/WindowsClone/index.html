<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Windows Clone</title>

    <link rel="stylesheet" href="style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <link
      rel="shortcut icon"
      href="./asserts/fevicon.png"
      type="image/x-icon"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <body>
    <main>
      <section id="menu" class="text-white rounded-4 py-3 px-2 fs-6 hidden">
        <div class="d-grid gap-1">
          <button class="d-flex align-items-center gap-3 options">
            <i class="bi bi-grid"></i>
            <span>View</span>
          </button>
          <button class="d-flex align-items-center gap-3 options">
            <i class="bi bi-arrow-down-up"></i>
            <span>Sort By</span>
          </button>
          <button class="d-flex align-items-center gap-3 options" id="refresh">
            <i class="bi bi-arrow-clockwise"></i>
            <span>Refresh</span>
          </button>
          <hr class="my-1 p-0" />
          <button class="d-flex align-items-center gap-3 options">
            <i class="bi bi-arrow-counterclockwise"></i>
            <span>Undo Delete</span>
          </button>
          <button class="d-flex align-items-center gap-3 options">
            <i class="bi bi-plus-circle"></i>
            <span>New</span>
          </button>
          <hr class="my-1 p-0" />

          <button class="d-flex align-items-center gap-3 options">
            <i class="bi bi-display"></i>
            <span>Display Settings</span>
          </button>
          <button class="d-flex align-items-center gap-3 options">
            <i class="bi bi-pencil"></i>
            <span>Personalize</span>
          </button>
          <hr class="my-1 p-0" />

          <button class="d-flex align-items-center gap-3 options">
            <i class="bi bi-terminal"></i>
            <span>Open in Terminal</span>
          </button>
          <hr class="my-1 p-0" />

          <button class="d-flex align-items-center gap-3 options">
            <i class="bi bi-box-arrow-up-right"></i>
            <span>Show more Options</span>
          </button>
        </div>
      </section>
    </main>

    <footer class="container-fluid p-2 px-3 d-flex align-items-center justify-content-between">
      <section>
        <div class="icon d-flex align-items-center gap-3">
          <div><img src="" alt="" id="weatherImage" class="w-100 h-100"></div>
          <div class="d-flex flex-column justify-content-center">
            <div id="temperature"></div>
            <div id="weather">Sunny</div>
          </div>
        </div>
      </section>
      <section class="d-flex align-items-center gap-3">
        <div class="icon d-flex align-items-center">
          <img src="./asserts/windows.png" />
        </div>

        <div
          class="d-flex align-items-center justify-content-center px-3 py-0 rounded-5 gap-2"
          id="searchBar"
        >
          <i class="bi bi-search text-white"></i>
          <input
            type="text"
            name="search"
            id="search"
            placeholder="Search"
            class="text-white"
          />
        </div>
        <div class="icon d-flex align-items-center">
          <img src="./asserts/desktop.png" />
        </div>
        <div class="icon d-flex align-items-center">
          <img src="./asserts/vlc.png" />
        </div>
        <div class="icon d-flex align-items-center">
          <img src="./asserts/edge.png" />
        </div>
        <div class="icon d-flex align-items-center">
          <img src="./asserts/vscode.png" />
        </div>
        <div class="icon d-flex align-items-center">
          <img src="./asserts/fileExplorer.png" />
        </div>
      </section>

      <section class="d-flex align-items-center gap-1">
        <div class="icon d-flex align-items-center">
          <img src="./asserts/wifi.png" />
        </div>
        <div
          id="datetime-container"
          class="icon d-flex flex-column align-items-end justify-content-center text-white px-3"
        >
          <div id="time"></div>
          <div id="date"></div>
        </div>
      </section>
    </footer>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="./script.js"></script>
  </body>
</html>
