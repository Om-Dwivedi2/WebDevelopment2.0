<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EventHandling Task-1</title>

    <link rel="stylesheet" href="./style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <main class="d-flex align-items-center justify-content-center">
      <div class="d-flex gap-5 border border-2 border-black p-4 w-50">
        <section class="d-flex flex-column gap-2 p-3" id="section1">
          <h1>This is a heading</h1>
          <p>
            Lorem ipsum dolor sit amet consectetur adipisicing elit. Nam,
            possimus?
          </p>
        </section>
        <section
          class="d-flex flex-column gap-2 align-items-end justify-content-center"
          id="section2"
        >
          <div class="d-flex gap-4">
            <label for="bgColor">Background Color</label>
            <input type="color" name="bgColor" id="bgColor" />
          </div>

          <div class="d-flex gap-4">
            <label for="headingColor">Heading Color</label>
            <input type="color" name="headingColor" id="headingColor" />
          </div>
          <div class="d-flex gap-4">
            <label for="paraColor">Paragraph Color</label>
            <input type="color" name="paraColor" id="paraColor" />
          </div>

          <button class="btn btn-outline-primary" id="reload">Reload</button>
        </section>
      </div>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
